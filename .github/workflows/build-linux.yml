name: Build Linux (artifacts)

# Builds the Linux bundle and uploads it as a downloadable workflow artifact —
# WITHOUT publishing a GitHub Release or touching the auto-updater manifest.
# Use this to smoke-test the Linux port before cutting a real `v*` release.
on:
  workflow_dispatch:
  push:
    branches:
      - linux-support

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri v2 on Linux needs the WebKitGTK 4.1 stack + patchelf (AppImage)
      # and libssl for the updater's TLS. ubuntu-latest ships GTK already.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install Node dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build backend sidecar (Linux)
        run: bash scripts/build-backend.sh

      # No tagName → tauri-action only builds; it does NOT create a release.
      - name: Build Tauri app (no release)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          projectPath: src-tauri

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: agentchat-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
