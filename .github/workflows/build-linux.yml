name: Build Linux (artifacts)

# Builds the Linux bundle and uploads it as a downloadable workflow artifact —
# WITHOUT publishing a GitHub Release or touching the auto-updater manifest.
# Use this to smoke-test the Linux port before cutting a real `v*` release.
# Run it manually from the Actions tab (workflow_dispatch).
on:
  workflow_dispatch:
  push:
    branches:
      - linux-support

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri v2 on Linux needs the WebKitGTK 4.1 stack + patchelf (AppImage)
      # and libssl for the updater's TLS. ubuntu-latest ships GTK already.
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Install Node dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build backend sidecar (Linux)
        run: bash scripts/build-backend.sh

      # Hand the just-built sidecar to the Arch AppImage job so it bundles the
      # exact same backend instead of rebuilding Python inside the container.
      - name: Upload Linux backend sidecar (for the Arch AppImage job)
        uses: actions/upload-artifact@v4
        with:
          name: linux-backend-sidecar
          path: src-tauri/binaries/agentchat-backend-x86_64-unknown-linux-gnu
          if-no-files-found: error
          retention-days: 1

      # No tagName → tauri-action only builds; it does NOT create a release.
      - name: Build Tauri app (no release)
        uses: tauri-apps/tauri-action@v0
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          projectPath: src-tauri

      - name: Upload Linux bundles
        uses: actions/upload-artifact@v4
        with:
          name: agentchat-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  # Smoke-test the AppImage the way real users get it: built on Arch so it bundles
  # a modern WebKitGTK. The AppImage from the ubuntu job above bundles Ubuntu's
  # older WebKit, which hard-aborts on EGL init against newer host Mesa (blank
  # "white screen"). This mirrors the release.yml `appimage-arch` job but uploads
  # a workflow artifact instead of touching a release.
  appimage-arch:
    needs: build-linux
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install build toolchain (pacman)
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git curl jq \
            rust nodejs npm \
            webkit2gtk-4.1 gtk3 libayatana-appindicator librsvg gdk-pixbuf2 \
            patchelf openssl

      - uses: actions/checkout@v4

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      - name: Fetch prebuilt Linux backend sidecar
        uses: actions/download-artifact@v4
        with:
          name: linux-backend-sidecar
          path: src-tauri/binaries
      - name: Make sidecar executable
        run: chmod +x src-tauri/binaries/agentchat-backend-x86_64-unknown-linux-gnu

      - name: Build UI
        run: |
          npm ci --prefix ui
          npm run build --prefix ui

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # linuxdeploy-plugin-gtk copies /usr/lib/gdk-pixbuf-2.0/2.10.0 and aborts if
      # it's missing; modern librsvg no longer creates it. See release.yml.
      - name: Prepare gdk-pixbuf loader cache (for linuxdeploy-plugin-gtk)
        run: |
          mkdir -p /usr/lib/gdk-pixbuf-2.0/2.10.0/loaders
          gdk-pixbuf-query-loaders --update-cache || true

      # See release.yml for why APPIMAGE_EXTRACT_AND_RUN and NO_STRIP are needed.
      # --verbose surfaces linuxdeploy's own stderr (tauri otherwise swallows it).
      - name: Build AppImage (Arch WebKit)
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: tauri build --verbose --bundles appimage

      - name: Upload Arch AppImage
        uses: actions/upload-artifact@v4
        with:
          name: agentchat-linux-appimage-arch
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
