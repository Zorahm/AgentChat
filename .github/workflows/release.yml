name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Bump tauri.conf.json version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $conf = "src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          $json.version = $version
          $json | ConvertTo-Json -Depth 32 | Set-Content $conf -Encoding utf8
          Write-Host "==> tauri.conf.json version -> $version"

      - name: Install Node dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build backend sidecar
        run: .\scripts\build-backend.ps1

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # Updater key is generated without a password; pass an explicit empty string.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AgentChat ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          projectPath: src-tauri

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $staging = "portable-staging"
          New-Item -ItemType Directory -Force $staging | Out-Null
          Copy-Item "src-tauri\target\release\AgentChat.exe" "$staging\"
          Copy-Item "src-tauri\binaries\agentchat-backend-x86_64-pc-windows-msvc.exe" "$staging\"
          $zip = "AgentChat_${version}_x64_portable.zip"
          Compress-Archive -Path "$staging\*" -DestinationPath $zip
          Write-Host "Portable: $zip ($([math]::Round((Get-Item $zip).Length / 1MB, 1)) MB)"

      - name: Upload portable to release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          gh release upload "${{ github.ref_name }}" "AgentChat_${version}_x64_portable.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
