name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      # Build every platform even if one fails, so a Windows hiccup doesn't
      # block the Linux artifacts (and vice versa).
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need the tag object itself (annotated tag message) — a shallow
          # checkout may omit it, so fetch full history + tags.
          fetch-depth: 0

      - name: Read release notes from the git tag message
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # The annotated tag's own message is the release text. `%(contents)`
          # yields subject + body (the maintainer writes it at `git tag -a`).
          $body = git tag -l $tag --format='%(contents)'
          $body = ($body -join "`n").Trim()
          if (-not $body) { $body = $tag }
          Write-Host "==> release notes:`n$body"
          $delim = "NOTES_EOF_$(Get-Random)"
          "body<<$delim"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $body           | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $delim          | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri v2 on Linux needs the WebKitGTK 4.1 stack + patchelf (AppImage)
      # and libssl for the updater's TLS. ubuntu-latest ships GTK already.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Bump tauri.conf.json version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $conf = "src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          $json.version = $version
          $json | ConvertTo-Json -Depth 32 | Set-Content $conf -Encoding utf8
          Write-Host "==> tauri.conf.json version -> $version"

      - name: Install Node dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build backend sidecar (Windows)
        if: runner.os == 'Windows'
        run: .\scripts\build-backend.ps1

      - name: Build backend sidecar (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/build-backend.sh

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # Updater key is generated without a password; pass an explicit empty string.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AgentChat ${{ github.ref_name }}"
          # This body is also written verbatim into latest.json `notes`, which
          # the in-app "About" update card displays — so it must be the real
          # release text, not a link to CHANGELOG. tauri-action merges each
          # matrix job's platforms into the single release + updater manifest.
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          projectPath: src-tauri

      - name: Package portable ZIP
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          $staging = "portable-staging"
          New-Item -ItemType Directory -Force $staging | Out-Null
          Copy-Item "src-tauri\target\release\AgentChat.exe" "$staging\"
          Copy-Item "src-tauri\binaries\agentchat-backend-x86_64-pc-windows-msvc.exe" "$staging\"
          $zip = "AgentChat_${version}_x64_portable.zip"
          Compress-Archive -Path "$staging\*" -DestinationPath $zip
          Write-Host "Portable: $zip ($([math]::Round((Get-Item $zip).Length / 1MB, 1)) MB)"

      - name: Upload portable to release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v',''
          gh release upload "${{ github.ref_name }}" "AgentChat_${version}_x64_portable.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
