name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      # Build every platform even if one fails, so a Windows hiccup doesn't
      # block the Linux artifacts (and vice versa).
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ""
          - os: ubuntu-latest
            # deb + rpm only. The AppImage is rebuilt on Arch (appimage-arch job)
            # because ubuntu-latest's WebKit is too old and white-screens on newer
            # distros — so we don't build (or ship) an AppImage from here at all.
            args: "--bundles deb,rpm"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need the tag object itself (annotated tag message) — a shallow
          # checkout may omit it, so fetch full history + tags.
          fetch-depth: 0

      - name: Read release notes from the git tag message
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # The annotated tag's own message is the release text. `%(contents)`
          # yields subject + body (the maintainer writes it at `git tag -a`).
          $body = git tag -l $tag --format='%(contents)'
          $body = ($body -join "`n").Trim()
          if (-not $body) { $body = $tag }
          Write-Host "==> release notes:`n$body"
          $delim = "NOTES_EOF_$(Get-Random)"
          "body<<$delim"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $body           | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $delim          | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri v2 on Linux needs the WebKitGTK 4.1 stack + patchelf (AppImage)
      # and libssl for the updater's TLS. ubuntu-latest ships GTK already.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Bump tauri.conf.json version from tag
        shell: pwsh
        run: |
          $full = "${{ github.ref_name }}" -replace '^v',''
          # MSI/NSIS require purely numeric versions — strip pre-release suffix
          $version = $full -replace '-.*',''
          $conf = "src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          
          # Support both root level and nested package.version structure in Tauri v2
          if ($json.package -and $json.package.version) {
              $json.package.version = $version
          } else {
              $json.version = $version
          }
          
          $json | ConvertTo-Json -Depth 32 | Set-Content $conf -Encoding utf8
          Write-Host "==> tauri.conf.json version -> $version (from $full)"

      - name: Install Node dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build backend sidecar (Windows)
        if: runner.os == 'Windows'
        run: .\scripts\build-backend.ps1

      - name: Build backend sidecar (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/build-backend.sh

      # Publish the just-built Linux sidecar so the Arch AppImage job (below) can
      # bundle the EXACT same backend instead of rebuilding Python on Arch. This
      # is additive — it does not change the .deb / .rpm / updater artifacts.
      - name: Upload Linux backend sidecar (for the Arch AppImage job)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-backend-sidecar
          path: src-tauri/binaries/agentchat-backend-x86_64-unknown-linux-gnu
          if-no-files-found: error
          retention-days: 1

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # Updater key is generated without a password; pass an explicit empty string.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AgentChat ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          # Build into a DRAFT. The `publish` job flips it live only after the Arch
          # AppImage lands, so nothing — and no broken interim AppImage — is ever
          # public mid-build.
          releaseDraft: true
          prerelease: false
          projectPath: src-tauri
          # Per-OS bundle selection (Linux: deb,rpm — no AppImage here).
          args: ${{ matrix.args }}
          # One naming scheme for every asset, e.g.
          # agentchat-3.0.0-linux-x86_64.deb / agentchat-3.0.0-windows-x86_64.exe.
          assetNamePattern: "agentchat-[version]-[platform]-[arch][ext]"
          # Do NOT set `includeRelease: false` — that input means "produce a
          # release (non-debug) build", not "skip the GitHub Release"; false makes
          # tauri-action build nothing ("No artifacts were found").

  # ---------------------------------------------------------------------------
  # The AppImage bundles WebKitGTK from the build host. Built on ubuntu-latest,
  # that WebKit is too old and hard-aborts on EGL init against a newer host Mesa
  # (Arch / CachyOS / Fedora) — the webview crashes and the window is blank
  # ("white screen"). The .deb / .rpm are fine because they use the *target's*
  # system WebKit, so only the AppImage needs a modern WebKit baked in.
  #
  # So we rebuild ONLY the AppImage inside an Arch container (fresh WebKitGTK,
  # matching the distros AppImage users actually run) and overwrite the AppImage
  # asset the release job already uploaded. The .deb, .rpm, Windows artifacts and
  # the updater manifest (latest.json) are left exactly as the release job made
  # them.
  appimage-arch:
    needs: release
    runs-on: ubuntu-latest
    container: archlinux:latest
    permissions:
      contents: write
    steps:
      # Install the toolchain first — the container is bare Arch, and
      # actions/checkout needs git present in the container.
      - name: Install build toolchain (pacman)
        run: |
          pacman -Syu --noconfirm --needed \
            base-devel git curl jq \
            rust nodejs npm \
            webkit2gtk-4.1 gtk3 libayatana-appindicator librsvg gdk-pixbuf2 \
            patchelf openssl github-cli

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Checkout runs as root inside the container; mark the tree safe so git
      # (used by the version bump and tauri) doesn't refuse "dubious ownership".
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory '*'

      # Same strip logic as the release job's pwsh step, in bash/jq: the tag's
      # version, minus any pre-release suffix, into tauri.conf.json so the built
      # AppImage filename matches the asset the release job uploaded.
      - name: Bump tauri.conf.json version from tag
        run: |
          full="${GITHUB_REF_NAME#v}"
          version="${full%%-*}"
          jq --arg v "$version" '.version = $v' src-tauri/tauri.conf.json > src-tauri/tauri.conf.json.tmp
          mv src-tauri/tauri.conf.json.tmp src-tauri/tauri.conf.json
          echo "==> tauri.conf.json version -> $version (from $full)"

      # Reuse the sidecar the release job built on ubuntu (same backend as the
      # .deb) rather than rebuilding Python inside a rolling-release container.
      - name: Fetch prebuilt Linux backend sidecar
        uses: actions/download-artifact@v4
        with:
          name: linux-backend-sidecar
          path: src-tauri/binaries
      - name: Make sidecar executable
        run: chmod +x src-tauri/binaries/agentchat-backend-x86_64-unknown-linux-gnu

      - name: Build UI
        run: |
          npm ci --prefix ui
          npm run build --prefix ui

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # linuxdeploy-plugin-gtk copies /usr/lib/gdk-pixbuf-2.0/2.10.0 wholesale and
      # aborts if it's missing ("cp: cannot stat …"). Modern librsvg no longer
      # ships a gdk-pixbuf loader, so on a minimal container that dir never gets
      # created. Materialise it (and its loader cache) so the plugin can copy it.
      - name: Prepare gdk-pixbuf loader cache (for linuxdeploy-plugin-gtk)
        run: |
          mkdir -p /usr/lib/gdk-pixbuf-2.0/2.10.0/loaders
          gdk-pixbuf-query-loaders --update-cache || true

      # APPIMAGE_EXTRACT_AND_RUN: linuxdeploy/appimagetool are themselves
      #   AppImages and there is no FUSE inside the container, so make them
      #   self-extract instead of mounting.
      # NO_STRIP: linuxdeploy's bundled `strip` is old binutils and chokes on
      #   Arch's modern libraries ("unknown type [0x13] section .relr.dyn" — the
      #   DT_RELR relocation format), which aborts the whole bundle. Stripping is
      #   only a size optimisation, so skip it.
      - name: Build AppImage (Arch WebKit)
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: tauri build --bundles appimage

      # Name the AppImage to match the other assets (the release job renamed
      # everything via assetNamePattern) by taking the .deb's name and swapping the
      # extension — e.g. agentchat-3.0.0-linux-x86_64.deb ->
      # agentchat-3.0.0-linux-x86_64.AppImage — then upload it into the still-DRAFT
      # release. The publish job flips the whole release live afterwards.
      - name: Upload AppImage into the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          built=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          deb=$(gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --json assets \
            --jq '.assets[].name' | grep -E '\.deb$' | head -1)
          if [ -z "$deb" ]; then
            echo "no .deb asset on the release to derive the AppImage name from" >&2
            exit 1
          fi
          name="${deb%.deb}.AppImage"
          echo "==> Uploading $(basename "$built") as $name ($(du -h "$built" | cut -f1))"
          tmp=$(mktemp -d)
          cp "$built" "$tmp/$name"
          gh release upload "$GITHUB_REF_NAME" "$tmp/$name" --repo "$GITHUB_REPOSITORY" --clobber

  # ---------------------------------------------------------------------------
  # Everything above builds into a DRAFT release. Only once every platform AND
  # the Arch AppImage have landed do we flip the release public — so users never
  # see a half-built release or a broken interim AppImage.
  publish:
    needs: [release, appimage-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --draft=false --latest