name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      # Build every platform even if one fails, so a Windows hiccup doesn't
      # block the Linux artifacts (and vice versa).
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Need the tag object itself (annotated tag message) — a shallow
          # checkout may omit it, so fetch full history + tags.
          fetch-depth: 0

      - name: Read release notes from the git tag message
        id: notes
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          # The annotated tag's own message is the release text. `%(contents)`
          # yields subject + body (the maintainer writes it at `git tag -a`).
          $body = git tag -l $tag --format='%(contents)'
          $body = ($body -join "`n").Trim()
          if (-not $body) { $body = $tag }
          Write-Host "==> release notes:`n$body"
          $delim = "NOTES_EOF_$(Get-Random)"
          "body<<$delim"  | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $body           | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          $delim          | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Tauri v2 on Linux needs the WebKitGTK 4.1 stack + patchelf (AppImage)
      # and libssl for the updater's TLS. ubuntu-latest ships GTK already.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Bump tauri.conf.json version from tag
        shell: pwsh
        run: |
          $full = "${{ github.ref_name }}" -replace '^v',''
          # MSI/NSIS require purely numeric versions — strip pre-release suffix
          $version = $full -replace '-.*',''
          $conf = "src-tauri/tauri.conf.json"
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          
          # Support both root level and nested package.version structure in Tauri v2
          if ($json.package -and $json.package.version) {
              $json.package.version = $version
          } else {
              $json.version = $version
          }
          
          $json | ConvertTo-Json -Depth 32 | Set-Content $conf -Encoding utf8
          Write-Host "==> tauri.conf.json version -> $version (from $full)"

      - name: Install Node dependencies
        run: npm ci --prefix ui

      - name: Build UI
        run: npm run build --prefix ui

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Build backend sidecar (Windows)
        if: runner.os == 'Windows'
        run: .\scripts\build-backend.ps1

      - name: Build backend sidecar (Linux)
        if: runner.os == 'Linux'
        run: bash scripts/build-backend.sh

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          # Updater key is generated without a password; pass an explicit empty string.
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AgentChat ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
          projectPath: src-tauri
          includeRelease: false # We will handle artifact renaming and uploading manually to avoid race conditions

      - name: Rename, package and upload release artifacts
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v',''
          $staging = "release-staging"
          New-Item -ItemType Directory -Force $staging | Out-Null

          # 1. Process Windows artifacts
          if ("${{ runner.os }}" -eq "Windows") {
            $os = "windows"
            $dir = "src-tauri/target/release/bundle"
            $nsis = Get-ChildItem "$dir/nsis/*_nsis-setup.exe" | Select-Object -First 1
            $msi  = Get-ChildItem "$dir/msi/*.msi"             | Select-Object -First 1
            $upd  = Get-ChildItem "src-tauri/target/release/AgentChat.exe" | Select-Object -First 1
            $sig  = Get-ChildItem "src-tauri/target/release/*.sig"        | Select-Object -First 1

            if ($nsis) { Copy-Item $nsis.FullName "$staging\agentchat-$ver-$os.exe" }
            if ($msi)  { Copy-Item $msi.FullName  "$staging\agentchat-$ver-$os.msi" }
            if ($upd)  { Copy-Item $upd.FullName  "$staging\agentchat-$ver-$os" }
            if ($sig)  { Copy-Item $sig.FullName  "$staging\agentchat-$ver-$os.sig" }

            # Create Portable ZIP directly in staging directory
            $portableStaging = "portable-staging"
            New-Item -ItemType Directory -Force $portableStaging | Out-Null
            Copy-Item "src-tauri\target\release\AgentChat.exe" "$portableStaging\"
            Copy-Item "src-tauri\binaries\agentchat-backend-x86_64-pc-windows-msvc.exe" "$portableStaging\"
            $zipPath = "$staging\agentchat-$ver-windows.zip"
            Compress-Archive -Path "$portableStaging\*" -DestinationPath $zipPath
            Write-Host "Portable ZIP created at: $zipPath"
          } 
          # 2. Process Linux artifacts
          else {
            $os = "linux"
            $dir = "src-tauri/target/release/bundle"
            $appimage = Get-ChildItem "$dir/appimage/*.AppImage" | Select-Object -First 1
            $deb      = Get-ChildItem "$dir/deb/*.deb"          | Select-Object -First 1
            $appimage_sig = Get-ChildItem "$dir/appimage/*.AppImage.sig" | Select-Object -First 1

            if ($appimage)     { Copy-Item $appimage.FullName     "$staging\agentchat-$ver-$os.x86_64.AppImage" }
            if ($deb)          { Copy-Item $deb.FullName          "$staging\agentchat-$ver-$os.x86_64.deb" }
            if ($appimage_sig) { Copy-Item $appimage_sig.FullName "$staging\agentchat-$ver-$os.x86_64.AppImage.sig" }
          }

          # 3. Upload all prepared assets
          $assets = Get-ChildItem "$staging\*"
          foreach ($f in $assets) {
            Write-Host "Uploading: $($f.Name)"
            gh release upload $tag $f.FullName --clobber
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}